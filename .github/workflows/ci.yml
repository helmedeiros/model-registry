name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: lint + vet + test + cover + check-adrs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make ci-local

      - name: Compute coverage percentage
        id: coverage
        run: |
          if [ ! -s coverage.out ] || [ "$(wc -l < coverage.out | tr -d ' ')" -le 1 ]; then
            echo "value=0" >> "$GITHUB_OUTPUT"
            echo "color=lightgrey" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "value=$total" >> "$GITHUB_OUTPUT"
          if awk "BEGIN{exit ! ($total >= 90)}"; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 80)}"; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 70)}"; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi
