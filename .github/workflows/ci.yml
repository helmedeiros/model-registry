name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: lint + vet + test + cover + check-adrs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: make ci-local

      - name: Compute coverage percentage
        id: coverage
        run: |
          if [ ! -s coverage.out ] || [ "$(wc -l < coverage.out | tr -d ' ')" -le 1 ]; then
            echo "value=0" >> "$GITHUB_OUTPUT"
            echo "color=lightgrey" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          total=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "value=$total" >> "$GITHUB_OUTPUT"
          if awk "BEGIN{exit ! ($total >= 90)}"; then
            echo "color=brightgreen" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 80)}"; then
            echo "color=green" >> "$GITHUB_OUTPUT"
          elif awk "BEGIN{exit ! ($total >= 70)}"; then
            echo "color=yellow" >> "$GITHUB_OUTPUT"
          else
            echo "color=red" >> "$GITHUB_OUTPUT"
          fi

  image:
    name: build image (publish on main and tags)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On main pushes tag :main + :sha-<short>; on tag pushes add the
      # tag name (e.g., :v0.0.4). PRs do not publish but the tag list
      # still populates so the build-and-don't-push verification path
      # stays identical to the publish path.
      - name: Compute image tags
        id: tags
        env:
          REPO: ghcr.io/${{ github.repository }}
        run: |
          short_sha="${GITHUB_SHA:0:8}"
          tags="${REPO}:sha-${short_sha}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${REPO}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF#refs/tags/}"
            tags="${tags},${REPO}:${tag_name}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build (push only on main and tags)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: cmd/model-registry/Dockerfile
          # Multi-arch manifest list. amd64 = runner's native arch (no
          # emulation in go build because the Dockerfile pins
          # --platform=$BUILDPLATFORM on the build stage and
          # cross-compiles via GOARCH). arm64 = Apple Silicon dev boxes
          # + Graviton production.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
